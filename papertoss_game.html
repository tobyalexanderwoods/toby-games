<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Toss</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #f5deb3 0%, #deb887 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2.5em;
        }
        
        .score-info {
            display: flex;
            justify-content: space-around;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .score-item {
            background: rgba(100, 150, 200, 0.2);
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        
        #gameCanvas {
            background: linear-gradient(180deg, #e6f3ff 0%, #fff9e6 100%);
            border: 3px solid #333;
            display: block;
            margin: 20px auto;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .controls {
            color: #333;
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.8;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            background: #4CAF50;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .status {
            color: #333;
            font-size: 1.2em;
            margin-top: 15px;
            font-weight: bold;
            min-height: 30px;
        }
        
        .instructions {
            color: #666;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 PAPER TOSS</h1>
        
        <div class="score-info">
            <div class="score-item">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="score-item">
                <div>Shots: <span id="shots">0</span></div>
            </div>
            <div class="score-item">
                <div>Made: <span id="made">0</span></div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="900" height="400"></canvas>
        
        <div class="controls">
            <strong>Click on the canvas to shoot the paper ball</strong><br>
            <strong>Try to toss it into the trash bin!</strong><br>
        </div>
        
        <button id="resetBtn">Reset Game</button>
        
        <div class="status" id="gameStatus">Click the canvas to shoot!</div>
        
        <div class="instructions">
            <p>Toss paper into the trash bin! Each successful shot is 1 point. Watch out for the wind!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game variables
        let score = 0;
        let shots = 0;
        let made = 0;
        let ballMoving = false;
        let wind = 0;
        let windTimer = 0;
        
        // Paper ball starting position
        const startX = 100;
        const startY = canvas.height - 100;
        
        // Paper ball
        const ball = {
            x: startX,
            y: startY,
            radius: 8,
            vx: 0,
            vy: 0,
            gravity: 0.4,
            friction: 0.98
        };
        
        // Trash bin
        const bin = {
            x: canvas.width - 150,
            y: canvas.height - 120,
            width: 60,
            height: 80,
            openX: 0,
            openWidth: 50
        };
        
        // Canvas click
        canvas.addEventListener('click', (e) => {
            if (ballMoving) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // Calculate angle and power based on click position
            const dx = clickX - ball.x;
            const dy = clickY - ball.y;
            
            // Random power (makes it more fun and chaotic)
            const power = 1 + Math.random() * 0.5;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 20) {
                const angle = Math.atan2(dy, dx);
                
                ball.vx = Math.cos(angle) * power * 10;
                ball.vy = Math.sin(angle) * power * 10;
                
                ballMoving = true;
                shots++;
                document.getElementById('shots').textContent = shots;
                
                // Randomize wind
                wind = (Math.random() - 0.5) * 2;
                
                updateStatus('Flying!');
            }
        });
        
        function updatePhysics() {
            if (!ballMoving) return;
            
            // Apply wind
            ball.vx += wind * 0.05;
            
            // Gravity
            ball.vy += ball.gravity;
            
            // Friction
            ball.vx *= ball.friction;
            ball.vy *= ball.friction;
            
            // Update position
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Wall boundaries
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.7;
            }
            if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.vx *= -0.7;
            }
            
            // Floor
            if (ball.y + ball.radius > canvas.height - 10) {
                ball.y = canvas.height - 10 - ball.radius;
                ball.vx *= 0.9;
                ball.vy *= -0.6;
            }
            
            // Check bin collision
            if (ball.y + ball.radius >= bin.y &&
                ball.y - ball.radius <= bin.y + bin.height &&
                ball.x >= bin.x + bin.openX &&
                ball.x <= bin.x + bin.openX + bin.openWidth) {
                
                if (ball.vy > 0) {
                    score++;
                    made++;
                    document.getElementById('score').textContent = score;
                    document.getElementById('made').textContent = made;
                    
                    // Reset ball
                    ball.x = startX;
                    ball.y = startY;
                    ball.vx = 0;
                    ball.vy = 0;
                    ballMoving = false;
                    wind = 0;
                    
                    updateStatus('🎯 GOAL! Click to toss again!');
                }
            }
            
            // Stop if too slow
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (speed < 0.3 && ball.y > canvas.height - 50) {
                ball.vx = 0;
                ball.vy = 0;
                ballMoving = false;
                wind = 0;
                
                updateStatus('Missed! Click to try again!');
            }
        }
        
        function draw() {
            // Background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#e6f3ff');
            gradient.addColorStop(1, '#fff9e6');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Office desk surface
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            
            // Wind indicator
            ctx.fillStyle = '#666';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'left';
            if (ballMoving) {
                ctx.fillText(`Wind: ${wind > 0 ? '→' : '←'} ${Math.abs(wind).toFixed(1)}`, 20, 30);
            } else {
                ctx.fillText('Ready to toss!', 20, 30);
            }
            
            // Draw trash bin
            ctx.fillStyle = '#333';
            // Bin body
            ctx.beginPath();
            ctx.moveTo(bin.x, bin.y);
            ctx.lineTo(bin.x + bin.width, bin.y);
            ctx.lineTo(bin.x + bin.width - 10, bin.y + bin.height);
            ctx.lineTo(bin.x + 10, bin.y + bin.height);
            ctx.closePath();
            ctx.fill();
            
            // Bin opening
            ctx.fillStyle = '#111';
            ctx.fillRect(bin.x + bin.openX, bin.y - 5, bin.openWidth, 8);
            
            // Bin handle
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(bin.x + bin.width / 2, bin.y - 15, 20, Math.PI, 0);
            ctx.stroke();
            
            // Draw paper ball (simple white sphere)
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Ball outline and fold line
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Simple fold line to show it's paper
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius * 0.7, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        function updateStatus(text) {
            document.getElementById('gameStatus').textContent = text;
        }
        
        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            score = 0;
            shots = 0;
            made = 0;
            ball.x = startX;
            ball.y = startY;
            ball.vx = 0;
            ball.vy = 0;
            ballMoving = false;
            wind = 0;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('shots').textContent = '0';
            document.getElementById('made').textContent = '0';
            updateStatus('Click the canvas to shoot!');
        });
        
        gameLoop();
    </script>
</body>
</html>
