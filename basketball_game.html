<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .score-info {
            display: flex;
            justify-content: space-around;
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 5px;
        }
        
        #gameCanvas {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #8B4513;
            display: block;
            margin: 20px auto;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        
        .controls {
            color: #fff;
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.8;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            background: #ff6600;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #ff7722;
            transform: scale(1.05);
        }
        
        .status {
            color: #ffaa00;
            font-size: 1.1em;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
            min-height: 30px;
        }
        
        .instructions {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 15px;
            max-width: 700px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 BASKETBALL</h1>
        
        <div class="score-info">
            <div class="score-item">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="score-item">
                <div>Shots: <span id="shots">0</span></div>
            </div>
            <div class="score-item">
                <div>Made: <span id="made">0</span></div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div class="controls">
            <strong>Click and drag the ball backwards to aim</strong><br>
            <strong>Release to shoot!</strong><br>
        </div>
        
        <button id="resetBtn">Reset Game</button>
        
        <div class="status" id="gameStatus">Click and drag the ball to aim and shoot!</div>
        
        <div class="instructions">
            <p>Shoot baskets! Each successful shot scores 2 points. Line up your shot and release!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game variables
        let score = 0;
        let shots = 0;
        let madeBaskets = 0;
        let ballMoving = false;
        let aiming = false;
        let mouseX = 0, mouseY = 0;
        
        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            radius: 10,
            vx: 0,
            vy: 0,
            friction: 0.98,
            gravity: 0.5
        };
        
        // Hoop
        const hoop = {
            x: canvas.width / 2,
            y: 80,
            radius: 15,
            width: 30,
            depth: 15
        };
        
        // Court
        const court = {
            x: 50,
            y: 120,
            width: canvas.width - 100,
            height: canvas.height - 150
        };
        
        // Mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (ballMoving) return;
            
            const dx = mouseX - ball.x;
            const dy = mouseY - ball.y;
            if (Math.sqrt(dx * dx + dy * dy) < ball.radius * 3) {
                aiming = true;
            }
        });
        
        canvas.addEventListener('mouseup', (e) => {
            if (!aiming) return;
            aiming = false;
            
            // Calculate shot power
            const dx = mouseX - ball.x;
            const dy = mouseY - ball.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance > 20) {
                const power = Math.min(distance / 50, 1.2);
                const angle = Math.atan2(dy, dx);
                
                ball.vx = -Math.cos(angle) * power * 15;
                ball.vy = -Math.sin(angle) * power * 15;
                
                ballMoving = true;
                shots++;
                document.getElementById('shots').textContent = shots;
                updateStatus('Ball in air...');
            }
        });
        
        function updatePhysics() {
            if (!ballMoving) return;
            
            // Gravity
            ball.vy += ball.gravity;
            
            // Friction
            ball.vx *= ball.friction;
            ball.vy *= ball.friction;
            
            // Update position
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Court boundaries
            if (ball.x - ball.radius < court.x) {
                ball.x = court.x + ball.radius;
                ball.vx *= -0.7;
            }
            if (ball.x + ball.radius > court.x + court.width) {
                ball.x = court.x + court.width - ball.radius;
                ball.vx *= -0.7;
            }
            if (ball.y - ball.radius < court.y) {
                ball.y = court.y + ball.radius;
                ball.vy *= -0.7;
            }
            
            // Floor
            if (ball.y + ball.radius > canvas.height - 10) {
                ball.y = canvas.height - 10 - ball.radius;
                ball.vx *= 0.95;
                ball.vy *= -0.6;
            }
            
            // Check hoop collision
            const dx = ball.x - hoop.x;
            const dy = ball.y - hoop.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // Ball goes through hoop
            if (distance < hoop.radius + ball.radius && ball.y < hoop.y + 20) {
                if (ball.vy > 0) { // Going downward
                    score += 2;
                    madeBaskets++;
                    document.getElementById('score').textContent = score;
                    document.getElementById('made').textContent = madeBaskets;
                    
                    // Reset ball
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height - 100;
                    ball.vx = 0;
                    ball.vy = 0;
                    ballMoving = false;
                    
                    updateStatus('🎯 BASKET! Click to shoot again!');
                }
            }
            
            // Stop if slow enough and near ground
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (speed < 0.5 && ball.y > canvas.height - 50) {
                ball.vx = 0;
                ball.vy = 0;
                ballMoving = false;
                
                // Reset ball position
                ball.x = canvas.width / 2;
                ball.y = canvas.height - 100;
                
                updateStatus('Missed! Click to shoot again!');
            }
        }
        
        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Court outline
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.strokeRect(court.x, court.y, court.width, court.height);
            
            // Court lines
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(court.x + court.width / 2, court.y);
            ctx.lineTo(court.x + court.width / 2, court.y + court.height);
            ctx.stroke();
            
            // Backboard
            ctx.fillStyle = 'rgba(200, 200, 200, 0.5)';
            ctx.fillRect(hoop.x - 35, hoop.y - 50, 70, 50);
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2;
            ctx.strokeRect(hoop.x - 35, hoop.y - 50, 70, 50);
            
            // Rim
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.ellipse(hoop.x, hoop.y, hoop.width, hoop.depth, 0, 0, Math.PI * 2);
            ctx.stroke();
            
            // Net
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(hoop.x - hoop.width + (i * hoop.width * 2 / 4), hoop.y);
                ctx.lineTo(hoop.x - hoop.width + (i * hoop.width * 2 / 4) + 5, hoop.y + 30);
                ctx.stroke();
            }
            
            // Draw ball
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Ball lines (basketball pattern)
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Draw lines on ball
            ctx.beginPath();
            ctx.moveTo(ball.x - ball.radius * 0.7, ball.y);
            ctx.lineTo(ball.x + ball.radius * 0.7, ball.y);
            ctx.stroke();
            
            // Aiming line
            if (aiming) {
                ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                ctx.lineTo(mouseX, mouseY);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
        
        function updateStatus(text) {
            document.getElementById('gameStatus').textContent = text;
        }
        
        function gameLoop() {
            updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            score = 0;
            shots = 0;
            madeBaskets = 0;
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 100;
            ball.vx = 0;
            ball.vy = 0;
            ballMoving = false;
            aiming = false;
            
            document.getElementById('score').textContent = '0';
            document.getElementById('shots').textContent = '0';
            document.getElementById('made').textContent = '0';
            updateStatus('Game reset! Click to shoot!');
        });
        
        gameLoop();
    </script>
</body>
</html>
