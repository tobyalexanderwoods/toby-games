<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        .score-info {
            display: flex;
            justify-content: space-around;
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        
        .score-item {
            background: rgba(0, 255, 0, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
        }
        
        #gameCanvas {
            background: #000;
            border: 3px solid #00ff00;
            display: block;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .controls {
            color: #00ff00;
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.8;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00dd00;
            transform: scale(1.05);
        }
        
        .status {
            color: #00ff00;
            font-size: 1.2em;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            min-height: 30px;
        }
        
        .instructions {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE</h1>
        
        <div class="score-info">
            <div class="score-item">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="score-item">
                <div>High Score: <span id="highScore">0</span></div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <strong>Arrow Keys to move</strong><br>
            <strong>Eat the red food to grow</strong><br>
        </div>
        
        <button id="playBtn">Play / Restart</button>
        
        <div class="status" id="gameStatus">Press PLAY or use arrow keys!</div>
        
        <div class="instructions">
            <p>Navigate the snake, eat food, grow longer. Don't hit walls or yourself!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameOver = false;
        
        document.getElementById('highScore').textContent = highScore;
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });
        
        function generateFood() {
            let newFood;
            let validPosition = false;
            
            while (!validPosition) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                validPosition = !snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            return newFood;
        }
        
        function updateGame() {
            if (!gameRunning) return;
            
            direction = nextDirection;
            
            // Calculate new head
            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }
            
            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }
            
            snake.unshift(head);
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                food = generateFood();
            } else {
                snake.pop();
            }
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    // Head
                    ctx.fillStyle = '#00ff00';
                } else {
                    // Body
                    ctx.fillStyle = '#00aa00';
                }
                
                ctx.fillRect(
                    snake[i].x * gridSize + 1,
                    snake[i].y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            }
            
            // Draw food
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }
        
        function gameLoop() {
            updateGame();
            draw();
        }
        
        function startGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameRunning = true;
            gameOver = false;
            food = generateFood();
            document.getElementById('score').textContent = '0';
            document.getElementById('gameStatus').textContent = 'Game Running!';
            document.getElementById('playBtn').textContent = 'Restart';
        }
        
        function endGame() {
            gameRunning = false;
            gameOver = true;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('gameStatus').textContent = `🎉 Game Over! New High Score: ${score}!`;
            } else {
                document.getElementById('gameStatus').textContent = `Game Over! Score: ${score}`;
            }
        }
        
        document.getElementById('playBtn').addEventListener('click', startGame);
        
        // Game loop
        setInterval(gameLoop, 100);
        draw();
    </script>
</body>
</html>
