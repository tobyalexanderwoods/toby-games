<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        .game-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 20px 0;
        }
        
        #gameCanvas {
            background: #000;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .stats {
            color: #00ff00;
            text-align: left;
            font-size: 1.2em;
            min-width: 150px;
        }
        
        .stat-item {
            background: rgba(0, 255, 0, 0.1);
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 3px solid #00ff00;
        }
        
        .controls {
            color: #00ff00;
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.8;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00dd00;
            transform: scale(1.05);
        }
        
        .status {
            color: #00ff00;
            font-size: 1.2em;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            min-height: 30px;
        }
        
        .instructions {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧱 TETRIS</h1>
        
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="240" height="400"></canvas>
            <div class="stats">
                <div class="stat-item">
                    <div>Score</div>
                    <div style="font-size: 1.5em; margin-top: 5px;" id="score">0</div>
                </div>
                <div class="stat-item">
                    <div>Lines</div>
                    <div style="font-size: 1.5em; margin-top: 5px;" id="lines">0</div>
                </div>
                <div class="stat-item">
                    <div>Level</div>
                    <div style="font-size: 1.5em; margin-top: 5px;" id="level">1</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <strong>← / → Arrow Keys to move</strong><br>
            <strong>↑ Up Arrow to rotate</strong><br>
            <strong>↓ Down Arrow to drop faster</strong><br>
            <strong>SPACE to pause</strong><br>
        </div>
        
        <button id="playBtn">Play</button>
        
        <div class="status" id="gameStatus">Press PLAY to start!</div>
        
        <div class="instructions">
            <p>Stack the falling blocks! Complete rows to clear them and score points!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const BLOCK_SIZE = 20;
        const COLS = 12;
        const ROWS = 20;
        const COLORS = ['#ff0000', '#00ff00', '#0099ff', '#ffff00', '#ff6600', '#ff00ff', '#00ffff'];
        
        let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let dropSpeed = 1000;
        let lastDropTime = 0;
        
        const TETRIMINOS = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[0,1,0],[1,1,1]], // T
            [[1,0,0],[1,1,1]], // L
            [[0,0,1],[1,1,1]], // J
            [[1,1,0],[0,1,1]], // S
            [[0,1,1],[1,1,0]] // Z
        ];
        
        let currentPiece = null;
        let currentColor = null;
        let currentX = 0;
        let currentY = 0;
        
        function newPiece() {
            const idx = Math.floor(Math.random() * TETRIMINOS.length);
            currentPiece = TETRIMINOS[idx].map(row => [...row]);
            currentColor = COLORS[idx];
            currentX = Math.floor((COLS - currentPiece[0].length) / 2);
            currentY = 0;
            
            if (canCollide(currentX, currentY, currentPiece)) {
                endGame();
                return false;
            }
            return true;
        }
        
        function canCollide(x, y, piece) {
            for (let row = 0; row < piece.length; row++) {
                for (let col = 0; col < piece[row].length; col++) {
                    if (!piece[row][col]) continue;
                    
                    let newX = x + col;
                    let newY = y + row;
                    
                    if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                    if (newY >= 0 && board[newY][newX]) return true;
                }
            }
            return false;
        }
        
        function lockPiece() {
            for (let row = 0; row < currentPiece.length; row++) {
                for (let col = 0; col < currentPiece[row].length; col++) {
                    if (!currentPiece[row][col]) continue;
                    
                    let x = currentX + col;
                    let y = currentY + row;
                    
                    if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                        board[y][x] = currentColor;
                    }
                }
            }
            
            clearLines();
            
            if (!newPiece()) {
                return false;
            }
            return true;
        }
        
        function clearLines() {
            let linesCleared = 0;
            
            outer: for (let row = ROWS - 1; row >= 0; row--) {
                for (let col = 0; col < COLS; col++) {
                    if (!board[row][col]) continue outer;
                }
                // Row is complete
                board.splice(row, 1);
                board.unshift(Array(COLS).fill(null));
                linesCleared++;
                row++; // Check this row again
            }
            
            if (linesCleared > 0) {
                lines += linesCleared;
                score += linesCleared * 100 * level;
                level = Math.floor(lines / 10) + 1;
                dropSpeed = Math.max(200, 1000 - (level - 1) * 100);
                
                document.getElementById('score').textContent = score;
                document.getElementById('lines').textContent = lines;
                document.getElementById('level').textContent = level;
            }
        }
        
        function rotatePiece() {
            let rotated = [];
            for (let i = 0; i < currentPiece[0].length; i++) {
                let row = [];
                for (let j = currentPiece.length - 1; j >= 0; j--) {
                    row.push(currentPiece[j][i]);
                }
                rotated.push(row);
            }
            
            if (!canCollide(currentX, currentY, rotated)) {
                currentPiece = rotated;
            }
        }
        
        function update(now) {
            if (!gameRunning || gamePaused || gameOver) return;
            
            if (now - lastDropTime > dropSpeed) {
                if (!canCollide(currentX, currentY + 1, currentPiece)) {
                    currentY++;
                } else {
                    if (!lockPiece()) {
                        gameOver = true;
                    }
                }
                lastDropTime = now;
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
            
            // Draw board blocks
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col * BLOCK_SIZE + 1, row * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    }
                }
            }
            
            // Draw current falling piece
            if (currentPiece) {
                ctx.fillStyle = currentColor;
                for (let row = 0; row < currentPiece.length; row++) {
                    for (let col = 0; col < currentPiece[row].length; col++) {
                        if (currentPiece[row][col]) {
                            let x = currentX + col;
                            let y = currentY + row;
                            if (y >= 0) {
                                ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                            }
                        }
                    }
                }
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                if (gameRunning) {
                    gamePaused = !gamePaused;
                    updateStatus(gamePaused ? 'PAUSED' : 'Playing...');
                }
                e.preventDefault();
            }
            if (!gameRunning || gamePaused) return;
            
            if (e.key === 'ArrowLeft') {
                if (!canCollide(currentX - 1, currentY, currentPiece)) {
                    currentX--;
                }
            }
            if (e.key === 'ArrowRight') {
                if (!canCollide(currentX + 1, currentY, currentPiece)) {
                    currentX++;
                }
            }
            if (e.key === 'ArrowUp') {
                rotatePiece();
            }
            if (e.key === 'ArrowDown') {
                if (!canCollide(currentX, currentY + 1, currentPiece)) {
                    currentY++;
                    score += 1;
                    document.getElementById('score').textContent = score;
                }
            }
        });
        
        function startGame() {
            gameRunning = true;
            gamePaused = false;
            gameOver = false;
            score = 0;
            lines = 0;
            level = 1;
            dropSpeed = 1000;
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
            
            document.getElementById('score').textContent = '0';
            document.getElementById('lines').textContent = '0';
            document.getElementById('level').textContent = '1';
            
            lastDropTime = Date.now();
            newPiece();
            updateStatus('Playing...');
            document.getElementById('playBtn').textContent = 'Restart';
        }
        
        function endGame() {
            gameRunning = false;
            updateStatus(`Game Over! Score: ${score}`);
        }
        
        function updateStatus(text) {
            document.getElementById('gameStatus').textContent = text;
        }
        
        function gameLoop(now) {
            update(now);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.getElementById('playBtn').addEventListener('click', startGame);
        
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
