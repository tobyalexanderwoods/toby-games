<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        #gameCanvas {
            background: #1a1a2e;
            border: 3px solid #00ff00;
            display: block;
            margin: 20px auto;
            cursor: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .score {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .player-name {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }
        
        .controls {
            color: #fff;
            margin-top: 20px;
            font-size: 0.9em;
            line-height: 1.8;
        }
        
        .mode-selector {
            margin: 15px 0;
        }
        
        button {
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 1em;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00cc00;
            transform: scale(1.05);
        }
        
        button.active {
            background: #ff6b6b;
            color: #fff;
        }
        
        .status {
            color: #00ff00;
            font-size: 1.2em;
            margin-top: 10px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        .instructions {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 15px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏓 PING PONG</h1>
        
        <div class="score-board">
            <div class="score">
                <div id="player1Score">0</div>
                <div class="player-name" id="player1Name">Player 1</div>
            </div>
            <div class="score">
                <div id="player2Score">0</div>
                <div class="player-name" id="player2Name">CPU</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="mode-selector">
            <button id="vsComputerBtn" class="active">vs Computer</button>
            <button id="twoPlayerBtn">vs Player 2</button>
            <button id="resetBtn">Reset Game</button>
        </div>
        
        <div class="controls">
            <strong>Player 1 (Left):</strong> W / S keys (or UP/DOWN)<br>
            <strong>Player 2 (Right):</strong> I / K keys<br>
            <div class="status" id="gameStatus">Ready to Play!</div>
        </div>
        
        <div class="instructions">
            <p>First to 11 points wins! Hit the ball back and forth. Use the paddles to keep the ball in play.</p>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game variables
        let gameMode = 'vsComputer'; // 'vsComputer' or 'twoPlayer'
        let gameRunning = true;
        
        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            speedX: 5,
            speedY: 5,
            maxSpeed: 8
        };
        
        // Paddles
        const paddleHeight = 80;
        const paddleWidth = 10;
        
        const player1 = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 6,
            score: 0,
            keysPressed: {}
        };
        
        const player2 = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 5,
            score: 0,
            keysPressed: {}
        };
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (['W', 'S', 'I', 'K', 'ARROWUP', 'ARROWDOWN'].includes(key)) {
                if (key === 'W' || key === 'ARROWUP') player1.keysPressed['up'] = true;
                if (key === 'S' || key === 'ARROWDOWN') player1.keysPressed['down'] = true;
                if (key === 'I') player2.keysPressed['up'] = true;
                if (key === 'K') player2.keysPressed['down'] = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            const key = e.key.toUpperCase();
            if (['W', 'S', 'I', 'K', 'ARROWUP', 'ARROWDOWN'].includes(key)) {
                if (key === 'W' || key === 'ARROWUP') player1.keysPressed['up'] = false;
                if (key === 'S' || key === 'ARROWDOWN') player1.keysPressed['down'] = false;
                if (key === 'I') player2.keysPressed['up'] = false;
                if (key === 'K') player2.keysPressed['down'] = false;
            }
        });
        
        // Move paddles
        function movePaddles() {
            // Player 1
            if (player1.keysPressed['up'] && player1.y > 0) {
                player1.y -= player1.speed;
            }
            if (player1.keysPressed['down'] && player1.y < canvas.height - player1.height) {
                player1.y += player1.speed;
            }
            
            // Player 2 (AI or human)
            if (gameMode === 'vsComputer') {
                // AI logic
                const paddle2Center = player2.y + player2.height / 2;
                if (paddle2Center < ball.y - 35) {
                    player2.y += player2.speed;
                } else if (paddle2Center > ball.y + 35) {
                    player2.y -= player2.speed;
                }
            } else {
                // Human player 2
                if (player2.keysPressed['up'] && player2.y > 0) {
                    player2.y -= player2.speed;
                }
                if (player2.keysPressed['down'] && player2.y < canvas.height - player2.height) {
                    player2.y += player2.speed;
                }
            }
            
            // Keep paddles in bounds
            player1.y = Math.max(0, Math.min(canvas.height - player1.height, player1.y));
            player2.y = Math.max(0, Math.min(canvas.height - player2.height, player2.y));
        }
        
        // Move ball
        function moveBall() {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            
            // Bounce off top/bottom
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.speedY *= -1;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }
            
            // Paddle collisions
            // Player 1 paddle
            if (ball.speedX < 0 &&
                ball.x - ball.radius < player1.x + player1.width &&
                ball.y > player1.y &&
                ball.y < player1.y + player1.height) {
                ball.speedX *= -1.05;
                ball.x = player1.x + player1.width + ball.radius;
                
                // Add spin based on where ball hits paddle
                let collidePoint = ball.y - (player1.y + player1.height / 2);
                collidePoint /= player1.height / 2;
                ball.speedY = collidePoint * ball.maxSpeed;
            }
            
            // Player 2 paddle
            if (ball.speedX > 0 &&
                ball.x + ball.radius > player2.x &&
                ball.y > player2.y &&
                ball.y < player2.y + player2.height) {
                ball.speedX *= -1.05;
                ball.x = player2.x - ball.radius;
                
                // Add spin
                let collidePoint = ball.y - (player2.y + player2.height / 2);
                collidePoint /= player2.height / 2;
                ball.speedY = collidePoint * ball.maxSpeed;
            }
            
            // Score points
            if (ball.x < 0) {
                player2.score++;
                resetBall();
                updateScore();
            } else if (ball.x > canvas.width) {
                player1.score++;
                resetBall();
                updateScore();
            }
        }
        
        // Reset ball
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.speedY = (Math.random() > 0.5 ? 1 : -1) * 3;
        }
        
        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw center line
            ctx.strokeStyle = '#00ff00';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Draw paddles
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(player1.x, player1.y, player1.width, player1.height);
            ctx.fillRect(player2.x, player2.y, player2.width, player2.height);
            
            // Draw ball
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Update score display
        function updateScore() {
            document.getElementById('player1Score').textContent = player1.score;
            document.getElementById('player2Score').textContent = player2.score;
            
            if (player1.score >= 11) {
                document.getElementById('gameStatus').textContent = '🎉 Player 1 Wins!';
                gameRunning = false;
            } else if (player2.score >= 11) {
                document.getElementById('gameStatus').textContent = gameMode === 'vsComputer' ? '☠️ CPU Wins!' : '🎉 Player 2 Wins!';
                gameRunning = false;
            }
        }
        
        // Game loop
        function gameLoop() {
            if (gameRunning) {
                movePaddles();
                moveBall();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Mode buttons
        document.getElementById('vsComputerBtn').addEventListener('click', () => {
            gameMode = 'vsComputer';
            document.getElementById('vsComputerBtn').classList.add('active');
            document.getElementById('twoPlayerBtn').classList.remove('active');
            document.getElementById('player2Name').textContent = 'CPU';
            resetGame();
        });
        
        document.getElementById('twoPlayerBtn').addEventListener('click', () => {
            gameMode = 'twoPlayer';
            document.getElementById('twoPlayerBtn').classList.add('active');
            document.getElementById('vsComputerBtn').classList.remove('active');
            document.getElementById('player2Name').textContent = 'Player 2';
            resetGame();
        });
        
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        
        function resetGame() {
            player1.score = 0;
            player2.score = 0;
            resetBall();
            gameRunning = true;
            document.getElementById('gameStatus').textContent = 'Ready to Play!';
            updateScore();
        }
        
        // Start game
        gameLoop();
    </script>
</body>
</html>
