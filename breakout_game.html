<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        .score-info {
            display: flex;
            justify-content: space-around;
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        
        .score-item {
            background: rgba(0, 255, 0, 0.1);
            padding: 10px 15px;
            border-radius: 5px;
        }
        
        #gameCanvas {
            background: #000;
            border: 3px solid #00ff00;
            display: block;
            margin: 20px auto;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .controls {
            color: #00ff00;
            margin-top: 20px;
            font-size: 0.95em;
            line-height: 1.8;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00dd00;
            transform: scale(1.05);
        }
        
        .status {
            color: #00ff00;
            font-size: 1.2em;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            min-height: 30px;
        }
        
        .instructions {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧱 BREAKOUT</h1>
        
        <div class="score-info">
            <div class="score-item">
                <div>Score: <span id="score">0</span></div>
            </div>
            <div class="score-item">
                <div>Bricks: <span id="bricks">0</span></div>
            </div>
            <div class="score-item">
                <div>Lives: <span id="lives">3</span></div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="500" height="400"></canvas>
        
        <div class="controls">
            <strong>Arrow Keys or Mouse to move paddle</strong><br>
            <strong>SPACE or Click to launch ball</strong><br>
        </div>
        
        <button id="playBtn">Play</button>
        
        <div class="status" id="gameStatus">Press PLAY or move to start!</div>
        
        <div class="instructions">
            <p>Break all the bricks! Don't let the ball fall off the bottom!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game variables
        let gameRunning = false;
        let ballLaunched = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        
        // Paddle
        const paddle = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 20,
            width: 80,
            height: 15,
            speed: 7,
            dx: 0
        };
        
        // Ball
        const ball = {
            x: paddle.x + paddle.width / 2,
            y: paddle.y - 10,
            radius: 5,
            vx: 0,
            vy: 0,
            speed: 4
        };
        
        // Bricks
        let bricks = [];
        const brickColors = ['#ff0000', '#ff7700', '#ffff00', '#00ff00', '#0099ff', '#6600ff'];
        
        // Keyboard
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === ' ' && gameRunning && !ballLaunched) {
                launchBall();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Mouse control
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = Math.max(0, Math.min(mouseX - paddle.width / 2, canvas.width - paddle.width));
        });
        
        canvas.addEventListener('click', (e) => {
            if (gameRunning && !ballLaunched) {
                launchBall();
            }
        });
        
        function createBricks() {
            bricks = [];
            const brickWidth = 50;
            const brickHeight = 15;
            const brickPadding = 5;
            const brickOffsetX = 15;
            const brickOffsetY = 30;
            const rows = 4;
            const cols = 8;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    bricks.push({
                        x: col * (brickWidth + brickPadding) + brickOffsetX,
                        y: row * (brickHeight + brickPadding) + brickOffsetY,
                        width: brickWidth,
                        height: brickHeight,
                        color: brickColors[row % brickColors.length],
                        alive: true
                    });
                }
            }
            
            document.getElementById('bricks').textContent = bricks.length;
        }
        
        function launchBall() {
            if (ballLaunched) return;
            
            const angle = (Math.random() - 0.5) * Math.PI * 0.4;
            ball.vx = Math.sin(angle) * ball.speed;
            ball.vy = -Math.cos(angle) * ball.speed;
            ballLaunched = true;
        }
        
        function updatePaddle() {
            if (keys['ArrowLeft']) {
                paddle.x -= paddle.speed;
            }
            if (keys['ArrowRight']) {
                paddle.x += paddle.speed;
            }
            
            // Boundary
            paddle.x = Math.max(0, Math.min(paddle.x, canvas.width - paddle.width));
        }
        
        function updateBall() {
            if (!ballLaunched) {
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - 10;
                return;
            }
            
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Wall collisions
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.vx *= -1;
                ball.x = Math.max(ball.radius, Math.min(canvas.width - ball.radius, ball.x));
            }
            
            if (ball.y - ball.radius < 0) {
                ball.vy *= -1;
            }
            
            // Fall off bottom
            if (ball.y - ball.radius > canvas.height) {
                lives--;
                document.getElementById('lives').textContent = lives;
                
                if (lives <= 0) {
                    gameRunning = false;
                    document.getElementById('gameStatus').textContent = '💀 Game Over! Press PLAY to restart!';
                } else {
                    ballLaunched = false;
                    document.getElementById('gameStatus').textContent = `Lives: ${lives}. Click to launch!`;
                }
            }
            
            // Paddle collision
            if (ball.vy > 0 &&
                ball.y + ball.radius >= paddle.y &&
                ball.y - ball.radius <= paddle.y + paddle.height &&
                ball.x >= paddle.x &&
                ball.x <= paddle.x + paddle.width) {
                
                ball.vy *= -1;
                ball.y = paddle.y - ball.radius;
                
                // Add spin based on where it hits
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.vx = (hitPos - 0.5) * 6;
            }
            
            // Brick collisions
            for (let brick of bricks) {
                if (!brick.alive) continue;
                
                if (ball.x + ball.radius > brick.x &&
                    ball.x - ball.radius < brick.x + brick.width &&
                    ball.y + ball.radius > brick.y &&
                    ball.y - ball.radius < brick.y + brick.height) {
                    
                    brick.alive = false;
                    score += 10;
                    document.getElementById('score').textContent = score;
                    
                    // Determine collision side
                    const overlapLeft = (ball.x + ball.radius) - brick.x;
                    const overlapRight = (brick.x + brick.width) - (ball.x - ball.radius);
                    const overlapTop = (ball.y + ball.radius) - brick.y;
                    const overlapBottom = (brick.y + brick.height) - (ball.y - ball.radius);
                    
                    if (Math.min(overlapLeft, overlapRight) < Math.min(overlapTop, overlapBottom)) {
                        ball.vx *= -1;
                    } else {
                        ball.vy *= -1;
                    }
                    
                    // Check if all bricks destroyed
                    const remaining = bricks.filter(b => b.alive).length;
                    if (remaining === 0) {
                        gameRunning = false;
                        document.getElementById('gameStatus').textContent = '🎉 Level Complete! Press PLAY for next level!';
                    }
                }
            }
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw bricks
            for (let brick of bricks) {
                if (brick.alive) {
                    ctx.fillStyle = brick.color;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
                }
            }
            
            // Draw paddle
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            
            // Draw ball
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function gameLoop() {
            if (gameRunning && ballLaunched) {
                updatePaddle();
                updateBall();
            } else if (gameRunning) {
                updatePaddle();
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - 10;
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        document.getElementById('playBtn').addEventListener('click', () => {
            gameRunning = true;
            ballLaunched = false;
            score = 0;
            lives = 3;
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
            createBricks();
            document.getElementById('gameStatus').textContent = 'Click to launch!';
            document.getElementById('playBtn').textContent = 'Restart';
        });
        
        createBricks();
        gameLoop();
    </script>
</body>
</html>
